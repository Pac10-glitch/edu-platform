<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduScience — Plataforma de Ciencias y Matemáticas</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ... (todos los estilos originales se mantienen) ... */

/* Ajustes para AI en Home */
.home-ai-section {
  background: var(--cream);
  padding: 5rem 2rem;
  margin: 4rem 0;
  border-radius: var(--radius);
}
</style>
</head>
<body>

<!-- NAV actualizado -->
<nav>
  <div class="nav-inner">
    <div class="logo" onclick="showPage('home')">Edu<span>Science</span></div>
    <div class="nav-links" id="nav-links">
      <button class="nav-btn ghost" onclick="showPage('formulas')">Fórmulas</button>
      <button class="nav-btn ghost" onclick="showPage('chat')">Comunidad</button>
      <button class="nav-btn ghost" onclick="showPage('home'); document.getElementById('home-ai').scrollIntoView({behavior:'smooth'})">Asistente</button>
      <button class="nav-btn ghost" onclick="showPage('suscripciones')">Precios</button>
      <!-- ... resto del nav ... -->
    </div>
  </div>
</nav>

<!-- HOME con Asistente integrado -->
<div id="page-home" class="page active">
  <!-- Hero y Materias (sin cambios) -->

  <!-- === NUEVA SECCIÓN: ASISTENTE IA === -->
  <div id="home-ai" class="home-ai-section">
    <div class="section">
      <div class="section-tag">🤖 IA</div>
      <h2 class="section-title">Tu Asistente Personal de Ciencias</h2>
      <p class="section-sub">EduBot te ayuda 24/7 con explicaciones paso a paso, ejercicios y dudas. Exclusivo Premium.</p>

      <div class="ai-layout" style="height:auto;min-height:580px">
        <!-- El chat completo del asistente se incluye aquí -->
        <div style="display:flex;flex-direction:column;height:100%;background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--border)">
          <div class="ai-chat" id="ai-chat-home" style="flex:1;padding:1.5rem;overflow-y:auto"></div>
          <div class="ai-input-area">
            <div class="ai-input-wrap">
              <textarea class="ai-input" id="ai-input-home" placeholder="Ej: ¿Cómo se calcula la derivada de x²?" onkeydown="handleAiKeyHome(event)"></textarea>
              <button class="ai-send" onclick="sendAiMessageHome()">Enviar →</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Resto de la home (planes, footer) -->
</div>

<!-- Resto de páginas (formulas, chat, etc.) sin cambios importantes -->

<script>
// JS actualizado para el asistente en Home
function initHomeAI() {
  const chatHome = document.getElementById('ai-chat-home');
  chatHome.innerHTML = `
    <div class="ai-msg">
      <div class="ai-avatar">🤖</div>
      <div>
        <div class="ai-bubble">¡Hola! Soy EduBot. ¿En qué te ayudo hoy con matemáticas, física o química?</div>
      </div>
    </div>`;
}

function handleAiKeyHome(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAiMessageHome();
  }
}

function sendAiMessageHome() {
  // Reutiliza la lógica existente de sendAiMessage pero adaptada
  // (código completo en el archivo)
  if (!currentUser || currentUser.plan !== 'premium') {
    showToast('El asistente completo es exclusivo Premium. Prueba gratis con 3 consultas.', 'info');
    return;
  }
  // ... lógica de envío ...
}

// Inicialización
document.addEventListener('DOMContentLoaded', () => {
  updateNav();
  initHomeAI();
  // ... resto del init ...
});
</script>
</body>
</html>
